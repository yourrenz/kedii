<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Kedi AR Projesi</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; height: 100vh; }
      .mindar-ui-overlay { display: none !important; }

      #click-screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-color: darkblue; color: white; display: flex;
        align-items: center; justify-content: center; z-index: 10000; 
        font-family: sans-serif; cursor: pointer; transition: opacity 0.5s; 
      }
      #click-screen h1 {
        border: 4px solid white; padding: 20px 40px; border-radius: 20px;
        text-align: center; font-size: 24px;
      }
    </style>

    <script>
      AFRAME.registerComponent('video-handler', {
        init: function () {
          this.vid = document.querySelector("#kediVideo");
          this.el.addEventListener('targetFound', () => {
            this.vid.play();
          });
          this.el.addEventListener('targetLost', () => {
            this.vid.pause();
          });
        }
      });

      document.addEventListener("DOMContentLoaded", function() {
        const clickScreen = document.querySelector('#click-screen');
        const video = document.querySelector('#kediVideo');

        clickScreen.addEventListener('click', function() {
          clickScreen.style.opacity = '0';
          setTimeout(() => { clickScreen.style.display = 'none'; }, 500);
          
          video.muted = false; 
          video.play().then(() => { video.pause(); });
        });
      });
    </script>
  </head>
  <body>

    <div id="click-screen">
      <h1>BAŞLATMAK İÇİN <br> EKRANA DOKUN</h1>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./kedi_proje/targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="kediVideo" src="./kedi_proje/kedi.mp4?v=son" preload="auto" loop="true" playsinline="true" webkit-playsinline="true" muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" video-handler>
        <a-video src="#kediVideo" position="0 0 0" width="1" height="1.78" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

  </body>
</html>
